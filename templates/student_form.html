{% extends 'base.html' %}
{% load static %}
{% block content %}


<div class="container mt-5 w-50 h-50">
    <h1>Student Information Form</h1>
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group mb-3">
            <label for="name">Name</label>
            <input type="text" class="form-control" name="name" id="name" maxlength="100" required>
        </div>

        <div class="form-group mb-3">
            <label for="student_email">Email</label>
            <input type="email" class="form-control" name="student_email" id="student_email" maxlength="254" required>
        </div>

        <div class="form-group mb-3">
            <label for="college_name">College Name</label>
            <input type="text" class="form-control" name="college_name" id="college_name" maxlength="50" required>
        </div>

        <div class="form-group mb-3">
            <label for="roll_no">Roll Number</label>
            <input type="number" class="form-control" name="roll_no" id="roll_no" required>
        </div>

        <div class="form-group mb-4">
            <label for="student_techstacks">Tech Stacks</label>
            <input type="text" class="form-control" name="student_techstacks" id="student_techstacks" maxlength="200" placeholder="e.g., Python, Django, React" required>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
{% endblock %}
