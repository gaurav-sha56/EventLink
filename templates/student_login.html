{% extends "base.html" %}

{% block content %}
    <!-- Center Card -->
    <div class="flex items-center justify-center min-h-[85vh] mt-16">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <div class="flex justify-center mb-4 space-x-4">
                <a href="{% url 'student_login' %}" class="font-semibold text-blue-600 border-b-2 border-blue-600 pb-1">Student Login</a>
                <a href="{% url 'student_register' %}" class="font-semibold text-gray-500 hover:text-blue-600">Register</a>
            </div>
            <h2 class="text-2xl font-bold text-center text-gray-800">Welcome Student!</h2>
            <p class="text-sm text-center text-gray-500 mb-6">Login to register and join events.</p>

            <form method="POST" action="">
                {% csrf_token %}
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 font-medium">Username</label>
                        <input type="text" name="username" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium">Password</label>
                        <input type="password" name="password" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        {% if error_msg %}
                        <p class="text-red-500 text-center mb-4">{{ error_msg }}</p>
                        {% endif %}
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="mr-2">
                        <label for="remember" class="text-sm text-gray-600">Remember me</label>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Login</button>
                </div>
            </form>

            <p class="text-center text-sm text-gray-600 mt-4">
                Don’t have an account?
                <a href="{% url 'student_register' %}" class="text-blue-600 hover:underline">Register here</a>
            </p>
        </div>
    </div>
    {% endblock %}
