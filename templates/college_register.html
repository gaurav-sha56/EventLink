{% extends "base.html" %}
{% block content %}
    <!-- Center Card -->
    <div class="flex items-center justify-center min-h-[85vh] mt-14">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <div class="flex justify-center mb-4 space-x-4">
                <a href={% url "college_login" %} class="font-semibold text-gray-500 hover:text-blue-600">Login</a>
                <a href={% url "college_register" %} class="font-semibold text-blue-600 border-b-2 border-blue-600 pb-1">Register</a>
            </div>
            <h2 class="text-2xl font-bold text-center text-gray-800">College Registration</h2>
            <p class="text-sm text-center text-gray-500 mb-6">Create an account to host events.</p>

            <form method="POST" action="">
                <div class="space-y-4">
                    <input type="text" placeholder="College Name" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500">
                    <input type="email" placeholder="Email" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500">
                    <input type="password" placeholder="Password" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Register</button>
                </div>
            </form>

            <p class="text-center text-sm text-gray-600 mt-4">
                Already have an account?
                <a href={% url "college_login" %} class="text-blue-600 hover:underline">Login here</a>
            </p>
        </div>
    </div>
    {% endblock %}
