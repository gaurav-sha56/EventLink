{% extends "base.html" %}

{% block content %}
<!-- Center Card -->
    <div class="flex items-center justify-center min-h-[85vh] mt-14">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
            <div class="flex justify-center mb-4 space-x-4">
                <a href={% url "student_login" %} class="font-semibold text-gray-500 hover:text-blue-600">Login</a>
                <a href={% url "student_register" %} class="font-semibold text-blue-600 border-b-2 border-blue-600 pb-1">Register</a>
            </div>
            <h2 class="text-2xl font-bold text-center text-gray-800">Join as Student</h2>
            <p class="text-sm text-center text-gray-500 mb-6">Create your account to participate in events.</p>

            <form method="POST" action="/">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="block text-gray-700 font-medium">Username</label>
                    <input type="text" name="username" placeholder="Username" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500">
                    <label class="block text-gray-700 font-medium">E-mail</label>
                    <input type="email" name="email"placeholder="Email" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500">
                    <label class="block text-gray-700 font-medium">Password 1</label>
                    <input type="password" name="password1" placeholder="Password 1" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500">
                    <label class="block text-gray-700 font-medium">Confirm Password</label>
                    <input type="password" name="password2" placeholder="Confirm Password" required class="w-full px-4 py-2 rounded-lg bg-blue-50 border focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Register</button>
                </div>
            </form>

            <p class="text-center text-sm text-gray-600 mt-4">
                Already have an account?
                <a href={% url "student_login" %} class="text-blue-600 hover:underline">Login here</a>
            </p>
        </div>
    </div>
    <script>
        {% for message in messages %}
        alert(message)
        {% endfor %}
    </script>
    {% endblock %}
